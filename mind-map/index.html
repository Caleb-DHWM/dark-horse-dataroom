<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Dark Horse — Org Chart</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #06060f; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; color: white; }
#chart { width: 100vw; height: 100vh; cursor: grab; display: block; }
#chart:active { cursor: grabbing; }

/* ── MENU BUTTON ── */
#menu-btn {
  position: fixed; top: 14px; left: 14px; z-index: 500;
  width: 40px; height: 40px;
  background: rgba(10,10,28,0.92); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
  color: rgba(255,255,255,0.8); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 18px rgba(0,0,0,0.55); transition: all 0.18s;
  user-select: none;
}
#menu-btn:hover { background: rgba(20,20,50,0.98); color: white; }

/* ── SIDEBAR ── */
#sidebar {
  position: fixed; top: 0; left: -252px; height: 100%; width: 246px;
  z-index: 450; background: rgba(5,5,16,0.97); backdrop-filter: blur(24px);
  border-right: 1px solid rgba(255,255,255,0.07); padding: 64px 14px 22px;
  transition: left 0.28s cubic-bezier(0.22,1,0.36,1);
  box-shadow: 3px 0 36px rgba(0,0,0,0.65); overflow-y: auto;
}
#sidebar.open { left: 0; }
.sb-brand { font-size: 10px; letter-spacing: 3.5px; color: #FFD700; opacity: 0.72; text-transform: uppercase; margin-bottom: 3px; }
.sb-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
.sb-sec { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #3a3a5a; margin: 14px 0 7px; }
.sb-btn {
  display: flex; align-items: center; gap: 9px;
  width: 100%; padding: 8px 10px; margin-bottom: 5px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px; color: rgba(255,255,255,0.52); cursor: pointer;
  font-size: 12px; font-weight: 500; transition: all 0.15s; text-align: left;
}
.sb-btn .ic { font-size: 13px; width: 18px; text-align: center; }
.sb-btn:hover { background: rgba(255,255,255,0.09); color: white; }
.sb-btn.active { background: rgba(74,158,255,0.13); border-color: rgba(74,158,255,0.35); color: #7ec8ff; }
.sb-act {
  display: block; width: 100%; padding: 8px 10px; margin-bottom: 5px;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px; color: rgba(255,255,255,0.38); cursor: pointer; font-size: 11.5px;
  transition: all 0.15s; text-align: center;
}
.sb-act:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.72); }

/* ── LEGEND ── */
#legend {
  position: fixed; bottom: 14px; right: 14px; z-index: 400;
  background: rgba(5,5,16,0.88); backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.07); border-radius: 11px;
  padding: 11px 13px;
}
.leg-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; font-size: 10.5px; color: rgba(255,255,255,0.45); }
.leg-row:last-child { margin: 0; }
.leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* ── DETAIL PANEL ── */
#detail {
  position: fixed; top: 14px; right: -290px; z-index: 400; width: 274px;
  background: rgba(5,5,16,0.96); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.09); border-radius: 13px;
  padding: 17px; box-shadow: 0 14px 46px rgba(0,0,0,0.7);
  transition: right 0.3s cubic-bezier(0.22,1,0.36,1);
}
#detail.open { right: 14px; }
#det-x {
  position: absolute; top: 11px; right: 11px;
  width: 21px; height: 21px; background: rgba(255,255,255,0.06);
  border: none; border-radius: 50%; color: rgba(255,255,255,0.3);
  cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center;
  transition: all 0.14s;
}
#det-x:hover { background: rgba(255,255,255,0.14); color: white; }
#det-bar { height: 2px; border-radius: 2px; margin-bottom: 11px; }
#det-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; line-height: 1.35; }
#det-type { font-size: 9px; letter-spacing: 1.8px; text-transform: uppercase; color: rgba(255,255,255,0.28); margin-bottom: 10px; }
#det-hr { height: 1px; background: rgba(255,255,255,0.06); margin-bottom: 10px; }
#det-desc { font-size: 11.5px; color: rgba(255,255,255,0.55); line-height: 1.62; white-space: pre-line; }
</style>
</head>
<body>

<svg id="chart"></svg>

<button id="menu-btn" onclick="toggleMenu()">☰</button>

<div id="sidebar">
  <div class="sb-brand">Dark Horse</div>
  <div class="sb-title">Org Chart</div>

  <div class="sb-sec">Layout</div>
  <button class="sb-btn active" data-l="td" onclick="setLayout('td')"><span class="ic">↓</span>Top-Down</button>
  <button class="sb-btn" data-l="lr" onclick="setLayout('lr')"><span class="ic">→</span>Left-Right</button>
  <button class="sb-btn" data-l="radial" onclick="setLayout('radial')"><span class="ic">◉</span>Radial</button>

  <div class="sb-sec">Actions</div>
  <button class="sb-act" onclick="fitView()">↺ Reset View</button>
  <button class="sb-act" onclick="toggleMenu()">✕ Close Menu</button>
</div>

<div id="legend">
  <div class="leg-row"><div class="leg-dot" style="background:#c9a800"></div>Trust / Holdings</div>
  <div class="leg-row"><div class="leg-dot" style="background:#1a6fc4"></div>Family Office</div>
  <div class="leg-row"><div class="leg-dot" style="background:#6d4fc4"></div>RIA</div>
  <div class="leg-row"><div class="leg-dot" style="background:#5548a8"></div>Management / GP</div>
  <div class="leg-row"><div class="leg-dot" style="background:#0e8f8f"></div>Fund Vehicle</div>
  <div class="leg-row"><div class="leg-dot" style="background:#b55e00"></div>Operations</div>
  <div class="leg-row"><div class="leg-dot" style="background:#383852"></div>Dormant</div>
</div>

<div id="detail">
  <button id="det-x" onclick="closeDetail()">✕</button>
  <div id="det-bar"></div>
  <div id="det-name"></div>
  <div id="det-type"></div>
  <div id="det-hr"></div>
  <div id="det-desc"></div>
</div>

<script>
// ── COLORS ──────────────────────────────────────────────────────────────────
const C = {
  trust:   { bg:'#1a1500', border:'#c9a800', text:'#ffe066', badge:'rgba(201,168,0,0.18)' },
  holdings:{ bg:'#1a1500', border:'#c9a800', text:'#ffe066', badge:'rgba(201,168,0,0.18)' },
  office:  { bg:'#081628', border:'#1a6fc4', text:'#7ec8ff', badge:'rgba(26,111,196,0.18)' },
  ria:     { bg:'#130e28', border:'#6d4fc4', text:'#b8a4ff', badge:'rgba(109,79,196,0.18)' },
  mgmt:    { bg:'#100e22', border:'#5548a8', text:'#9e97df', badge:'rgba(85,72,168,0.18)' },
  fund:    { bg:'#041818', border:'#0e8f8f', text:'#4ddede', badge:'rgba(14,143,143,0.18)' },
  ops:     { bg:'#1a0e00', border:'#b55e00', text:'#ffaa44', badge:'rgba(181,94,0,0.18)' },
  dormant: { bg:'#0e0e18', border:'#383852', text:'#6a6a88', badge:'rgba(56,56,82,0.18)' },
};
const TYPE_LABEL = {
  trust:'Family Trust', holdings:'Holding Entity', office:'Family Office',
  ria:'Registered Investment Adviser', mgmt:'Management / GP Entity',
  fund:'Fund Vehicle', ops:'Operations', dormant:'Dormant Entity',
};

// ── DATA ────────────────────────────────────────────────────────────────────
const DATA = {
  id:'n1', name:'In God We Trust', type:'trust', desc:'Family Mission & Foundation',
  children:[{ id:'n2', name:'Caraway Holdings', type:'holdings', desc:'Family Holding Entity',
    children:[{ id:'n3', name:'Dark Horse Wealth Management', type:'office', desc:'Private Family Office — Governing Entity',
      children:[
        { id:'n4', name:'Dark Horse Advisers LLC', type:'ria',
          desc:'Registered Investment Adviser\nBeing Formed\nMadison Cornwell: IAR / CCO\nDori Karjian: CCO (contracted)' },
        { id:'n5', name:'Corinthian Capital Partners', type:'mgmt', desc:'Management / GP Entity — 75% ownership stake',
          children:[{ id:'n6', name:'Corinthian Capital Fund LLC', type:'fund', desc:'Private Debt Fund\nLends to PE-backed borrowers' }] },
        { id:'n7', name:'Draft Horse Wealth Mgmt', type:'mgmt', desc:'Management Entity',
          children:[{ id:'n8', name:'Draft Horse Capital Partners', type:'dormant', desc:'Private Credit Fund\n⚠ DORMANT — not yet active' }] },
        { id:'n9', name:'Quarter Horse Wealth Mgmt', type:'mgmt', desc:'Management Entity',
          children:[{ id:'n10', name:'Quarter Horse Capital Partners', type:'dormant', desc:'Multi-Strategy Fund\n⚠ DORMANT — not yet active' }] },
        { id:'n11', name:'Stateside Resources', type:'ops', desc:'Mineral Resources & Commodities',
          children:[{ id:'n12', name:'Field Futures Texas', type:'ops', desc:'8% Interest' }] },
        { id:'n13', name:'Virtue Management Co', type:'mgmt', desc:'Management Entity',
          children:[{ id:'n14', name:'Virtue', type:'fund', desc:'Fund Vehicle',
            children:[{ id:'n15', name:'Supernature Fund', type:'fund', desc:'Fund Vehicle' }] }] }
      ]
    }]
  }]
};

// ── CARD DIMENSIONS ─────────────────────────────────────────────────────────
const CW = 172; // card width
const CH = 48;  // card height
const RX = 8;   // corner radius
const PAD_X = 38; // horizontal gap between sibling cards
const PAD_Y = 72; // vertical gap between levels

// ── SVG SETUP ───────────────────────────────────────────────────────────────
let W = window.innerWidth, H = window.innerHeight;
const svg = d3.select('#chart').attr('width', W).attr('height', H);

// Background
svg.append('rect').attr('width','100%').attr('height','100%').attr('fill','#06060f');

const g = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.1, 3]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom).on('dblclick.zoom', null);

const linksG = g.append('g');
const nodesG = g.append('g');

// ── CURRENT LAYOUT ──────────────────────────────────────────────────────────
let currentLayout = 'td';
let menuOpen = false;

// ── LAYOUT ENGINE ───────────────────────────────────────────────────────────
function computeLayout(mode) {
  const root = d3.hierarchy(DATA);

  if (mode === 'td') {
    const tree = d3.tree().nodeSize([CW + PAD_X, CH + PAD_Y]);
    tree(root);
    root.each(d => { d.px = d.x; d.py = d.y; });

  } else if (mode === 'lr') {
    const tree = d3.tree().nodeSize([CH + PAD_X, CW + PAD_Y]);
    tree(root);
    root.each(d => { d.px = d.y; d.py = d.x; });

  } else if (mode === 'radial') {
    const tree = d3.tree().size([2 * Math.PI, 320]);
    tree(root);
    root.each(d => {
      d.px = d.y * Math.cos(d.x - Math.PI / 2);
      d.py = d.y * Math.sin(d.x - Math.PI / 2);
    });
  }

  return root;
}

// ── DRAW ────────────────────────────────────────────────────────────────────
function draw(mode, animate) {
  const root = computeLayout(mode);

  // ── LINKS ──
  const links = root.links();
  const linkSel = linksG.selectAll('path.edge').data(links, d => d.source.data.id + '-' + d.target.data.id);
  linkSel.exit().transition().duration(300).attr('opacity', 0).remove();

  const linkEnter = linkSel.enter().append('path')
    .attr('class', 'edge')
    .attr('fill', 'none')
    .attr('stroke-width', 1.5)
    .attr('stroke-linecap', 'round')
    .attr('opacity', 0);

  const linkMerge = linkEnter.merge(linkSel);
  linkMerge.attr('stroke', d => C[d.source.data.type]?.border || '#555');

  function edgePath(d) {
    const sx = d.source.px, sy = d.source.py;
    const tx = d.target.px, ty = d.target.py;
    if (mode === 'lr') {
      const mx = (sx + tx) / 2;
      return `M${sx + CW/2},${sy} C${mx},${sy} ${mx},${ty} ${tx - CW/2},${ty}`;
    } else if (mode === 'radial') {
      return `M${sx},${sy} L${tx},${ty}`;
    } else {
      // Top-down: elbow connector from bottom of parent to top of child
      const srcX = sx, srcY = sy + CH/2;
      const tgtX = tx, tgtY = ty - CH/2;
      const midY = (srcY + tgtY) / 2;
      return `M${srcX},${srcY} L${srcX},${midY} L${tgtX},${midY} L${tgtX},${tgtY}`;
    }
  }

  if (animate) {
    linkMerge.transition().duration(600).ease(d3.easeCubicInOut)
      .attr('opacity', 0.55)
      .attr('d', edgePath);
  } else {
    linkMerge.attr('d', edgePath).attr('opacity', 0.55);
  }

  // ── NODES ──
  const nodes = root.descendants();
  const nodeSel = nodesG.selectAll('g.card').data(nodes, d => d.data.id);
  nodeSel.exit().transition().duration(300).attr('opacity', 0).remove();

  const cardEnter = nodeSel.enter().append('g')
    .attr('class', 'card')
    .attr('opacity', 0)
    .attr('transform', d => `translate(${d.px - CW/2},${d.py - CH/2})`)
    .style('cursor', 'pointer')
    .on('click', (event, d) => { event.stopPropagation(); showDetail(d.data); });

  // Card background
  cardEnter.append('rect')
    .attr('width', CW).attr('height', CH)
    .attr('rx', RX).attr('ry', RX)
    .attr('fill', d => C[d.data.type]?.bg || '#111')
    .attr('stroke', d => C[d.data.type]?.border || '#444')
    .attr('stroke-width', 1.5);

  // Left accent bar
  cardEnter.append('rect')
    .attr('x', 0).attr('y', RX)
    .attr('width', 3)
    .attr('height', CH - RX * 2)
    .attr('rx', 1.5)
    .attr('fill', d => C[d.data.type]?.border || '#555');

  // Type badge
  cardEnter.append('rect')
    .attr('x', 10).attr('y', 6)
    .attr('width', d => {
      const t = (TYPE_LABEL[d.data.type] || d.data.type).length * 5.5 + 8;
      return Math.min(t, CW - 20);
    })
    .attr('height', 13)
    .attr('rx', 3)
    .attr('fill', d => C[d.data.type]?.badge || 'rgba(255,255,255,0.06)');

  cardEnter.append('text')
    .attr('class', 'badge-text')
    .attr('x', 14).attr('y', 15.5)
    .attr('font-size', '8px').attr('font-weight', '600')
    .style('letter-spacing', '0.6px').style('text-transform', 'uppercase')
    .attr('fill', d => C[d.data.type]?.text || '#aaa')
    .text(d => (TYPE_LABEL[d.data.type] || d.data.type).toUpperCase().substring(0, 22));

  // Entity name
  cardEnter.append('text')
    .attr('class', 'name-text')
    .attr('x', 10).attr('y', 34)
    .attr('font-size', '11px').attr('font-weight', '700')
    .attr('fill', 'rgba(255,255,255,0.92)')
    .text(d => {
      const name = d.data.name;
      return name.length > 22 ? name.substring(0, 21) + '…' : name;
    });

  // Second line if name is long
  cardEnter.append('text')
    .attr('class', 'name-text2')
    .attr('x', 10).attr('y', 44)
    .attr('font-size', '10px').attr('font-weight', '600')
    .attr('fill', 'rgba(255,255,255,0.6)')
    .text(d => {
      const name = d.data.name;
      if (name.length > 22) return name.substring(21);
      return '';
    });

  // Hover effect
  cardEnter.on('mouseenter', function(event, d) {
    d3.select(this).select('rect').attr('stroke-width', 2.5);
  }).on('mouseleave', function() {
    d3.select(this).select('rect').attr('stroke-width', 1.5);
  });

  const cardMerge = cardEnter.merge(nodeSel);

  if (animate) {
    cardMerge.transition().duration(600).ease(d3.easeCubicInOut)
      .attr('opacity', 1)
      .attr('transform', d => `translate(${d.px - CW/2},${d.py - CH/2})`);
  } else {
    cardMerge
      .attr('opacity', 1)
      .attr('transform', d => `translate(${d.px - CW/2},${d.py - CH/2})`);
  }
}

// ── FIT VIEW ─────────────────────────────────────────────────────────────────
function fitView() {
  requestAnimationFrame(() => {
    const b = g.node().getBBox();
    if (!b.width || !b.height) return;
    W = window.innerWidth; H = window.innerHeight;
    const pad = 60;
    const scale = Math.min(1, Math.min((W - pad*2) / b.width, (H - pad*2) / b.height));
    const tx = (W - b.width * scale) / 2 - b.x * scale;
    const ty = (H - b.height * scale) / 2 - b.y * scale;
    svg.transition().duration(700).ease(d3.easeCubicInOut)
      .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  });
}

// ── SET LAYOUT ───────────────────────────────────────────────────────────────
function setLayout(mode, init) {
  currentLayout = mode;
  document.querySelectorAll('.sb-btn[data-l]').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.sb-btn[data-l="${mode}"]`);
  if (btn) btn.classList.add('active');
  closeDetail();
  draw(mode, !init);
  setTimeout(fitView, init ? 0 : 700);
}

// ── DETAIL PANEL ─────────────────────────────────────────────────────────────
function showDetail(d) {
  const col = C[d.type]?.border || '#888';
  document.getElementById('det-bar').style.background = `linear-gradient(90deg,${col},transparent)`;
  document.getElementById('det-name').textContent = d.name;
  document.getElementById('det-type').textContent = TYPE_LABEL[d.type] || d.type;
  document.getElementById('det-desc').textContent = d.desc || '';
  document.getElementById('detail').classList.add('open');
}
function closeDetail() { document.getElementById('detail').classList.remove('open'); }
svg.on('click', closeDetail);

// ── MENU ─────────────────────────────────────────────────────────────────────
function toggleMenu() {
  menuOpen = !menuOpen;
  document.getElementById('sidebar').classList.toggle('open', menuOpen);
  const btn = document.getElementById('menu-btn');
  btn.textContent = menuOpen ? '✕' : '☰';
  btn.style.left = menuOpen ? '262px' : '14px';
}

// ── RESIZE ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  svg.attr('width', W).attr('height', H);
});

// ── INIT ─────────────────────────────────────────────────────────────────────
setLayout('td', true);
</script>
</body>
</html>

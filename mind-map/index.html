<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Horse — Entity Map</title>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.73.5/dist/3d-force-graph.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050510; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
#graph { width: 100vw; height: 100vh; }

/* Controls */
#controls {
  position: fixed; top: 20px; left: 20px; z-index: 100;
  background: rgba(10,10,30,0.85); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
  padding: 16px; color: white; min-width: 200px;
}
#controls h2 { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: #888; margin-bottom: 12px; }
#controls h1 { font-size: 16px; font-weight: 700; color: white; margin-bottom: 16px; }
.btn { display: block; width: 100%; padding: 8px 12px; margin-bottom: 8px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px; color: white; cursor: pointer; font-size: 13px;
  transition: all 0.2s; text-align: left; }
.btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); }
.btn.active { background: rgba(74,158,255,0.2); border-color: rgba(74,158,255,0.5); color: #4A9EFF; }

/* Legend */
#legend { position: fixed; bottom: 20px; left: 20px; z-index: 100;
  background: rgba(10,10,30,0.85); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; color: #aaa; }
.legend-item:last-child { margin-bottom: 0; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* Node detail panel */
#panel {
  position: fixed; top: 20px; right: -320px; z-index: 100;
  background: rgba(10,10,30,0.92); backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
  padding: 20px; width: 300px; color: white;
  transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
}
#panel.open { right: 20px; }
#panel-close { position: absolute; top: 12px; right: 12px; background: none; border: none;
  color: #666; cursor: pointer; font-size: 18px; line-height: 1; }
#panel-close:hover { color: #aaa; }
#panel-color-bar { height: 3px; border-radius: 2px; margin-bottom: 14px; }
#panel-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
#panel-type { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px; opacity: 0.5; }
#panel-desc { font-size: 13px; color: #ccc; line-height: 1.7; white-space: pre-line; }

/* Hint */
#hint {
  position: fixed; bottom: 20px; right: 20px; z-index: 100;
  background: rgba(10,10,30,0.7); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
  padding: 10px 14px; font-size: 11px; color: #555;
  line-height: 1.8;
}
</style>
</head>
<body>
<div id="controls">
  <h2>DARK HORSE</h2>
  <h1>Entity Map</h1>
  <button class="btn active" id="btn-3d" onclick="setLayout('3d')">⬡ 3D Force View</button>
  <button class="btn" id="btn-dag" onclick="setLayout('dag')">▼ Hierarchy View</button>
  <button class="btn" id="btn-reset" onclick="resetCamera()">↺ Reset Camera</button>
</div>

<div id="legend">
  <div class="legend-item"><div class="dot" style="background:#FFD700;box-shadow:0 0 6px #FFD700"></div>Trust / Holdings</div>
  <div class="legend-item"><div class="dot" style="background:#4A9EFF;box-shadow:0 0 6px #4A9EFF"></div>Family Office</div>
  <div class="legend-item"><div class="dot" style="background:#7B68EE;box-shadow:0 0 6px #7B68EE"></div>Management / GP / RIA</div>
  <div class="legend-item"><div class="dot" style="background:#00CED1;box-shadow:0 0 6px #00CED1"></div>Fund Vehicle</div>
  <div class="legend-item"><div class="dot" style="background:#FF8C00;box-shadow:0 0 6px #FF8C00"></div>Operations</div>
  <div class="legend-item"><div class="dot" style="background:#444466"></div>Dormant</div>
</div>

<div id="panel">
  <button id="panel-close" onclick="closePanel()">✕</button>
  <div id="panel-color-bar"></div>
  <div id="panel-title"></div>
  <div id="panel-type"></div>
  <div id="panel-desc"></div>
</div>

<div id="hint">
  🖱 Drag to rotate &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Click node for details
</div>

<div id="graph"></div>

<script>
const NODE_COLORS = {
  trust: '#FFD700',
  holdings: '#FFD700',
  office: '#4A9EFF',
  mgmt: '#7B68EE',
  ria: '#7B68EE',
  fund: '#00CED1',
  ops: '#FF8C00',
  dormant: '#444466'
};

const NODE_SIZES = {
  trust: 12,
  holdings: 11,
  office: 10,
  ria: 9,
  mgmt: 8,
  fund: 7,
  ops: 6,
  dormant: 5
};

const TYPE_LABELS = {
  trust: 'Family Trust',
  holdings: 'Holding Entity',
  office: 'Family Office',
  ria: 'Registered Investment Adviser',
  mgmt: 'Management / GP',
  fund: 'Fund Vehicle',
  ops: 'Operations',
  dormant: 'Dormant Entity'
};

const graphData = {
  nodes: [
    {id:1, name:"In God We Trust",              type:"trust",    desc:"Family Mission"},
    {id:2, name:"Caraway Holdings",              type:"holdings", desc:"Family Holding Entity"},
    {id:3, name:"Dark Horse Wealth Management",  type:"office",   desc:"Private Family Office"},
    {id:4, name:"Dark Horse Advisers LLC",       type:"ria",      desc:"RIA — Being Formed\nMadison Cornwell: IAR / CCO"},
    {id:5, name:"Corinthian Capital Partners",   type:"mgmt",     desc:"Management / GP Entity (75%)"},
    {id:6, name:"Corinthian Capital Fund LLC",   type:"fund",     desc:"Private Debt Fund"},
    {id:7, name:"Draft Horse Wealth Mgmt",       type:"mgmt",     desc:"Management Entity"},
    {id:8, name:"Draft Horse Capital Partners",  type:"fund",     desc:"Private Credit Fund\n⚠ DORMANT"},
    {id:9, name:"Quarter Horse Wealth Mgmt",     type:"mgmt",     desc:"Management Entity"},
    {id:10,name:"Quarter Horse Capital Partners",type:"fund",     desc:"Multi-Strategy Fund\n⚠ DORMANT"},
    {id:11,name:"Stateside Resources",           type:"ops",      desc:"Mineral Resources & Commodities"},
    {id:12,name:"Field Futures Texas",           type:"ops",      desc:"8% Interest"},
    {id:13,name:"Virtue Management Co",          type:"mgmt",     desc:"Management Entity"},
    {id:14,name:"Virtue",                        type:"fund",     desc:"Fund Vehicle"},
    {id:15,name:"Supernature Fund",              type:"fund",     desc:"Fund Vehicle"}
  ],
  links: [
    {source:1, target:2},
    {source:2, target:3},
    {source:3, target:4},
    {source:3, target:5},
    {source:3, target:7},
    {source:3, target:9},
    {source:3, target:11},
    {source:3, target:13},
    {source:5, target:6},
    {source:7, target:8},
    {source:9, target:10},
    {source:11,target:12},
    {source:13,target:14},
    {source:14,target:15}
  ]
};

let currentLayout = '3d';
let hoveredNode = null;

const Graph = ForceGraph3D()(document.getElementById('graph'))
  .backgroundColor('#050510')
  .graphData(graphData)
  .nodeLabel(n => `<span style="background:rgba(5,5,16,0.85);padding:4px 8px;border-radius:6px;font-size:12px;color:white;border:1px solid rgba(255,255,255,0.1)">${n.name}</span>`)
  .nodeColor(n => NODE_COLORS[n.type] || '#888888')
  .nodeVal(n => {
    const base = NODE_SIZES[n.type] || 6;
    return hoveredNode && hoveredNode.id === n.id ? base * 1.6 : base;
  })
  .nodeOpacity(0.92)
  .linkColor(l => {
    const src = l.source && l.source.type ? l.source : graphData.nodes.find(n => n.id === l.source);
    return NODE_COLORS[src?.type] || '#445566';
  })
  .linkWidth(1.5)
  .linkOpacity(0.55)
  .linkDirectionalParticles(2)
  .linkDirectionalParticleSpeed(0.004)
  .linkDirectionalParticleWidth(2)
  .linkDirectionalParticleColor(l => {
    const src = l.source && l.source.type ? l.source : graphData.nodes.find(n => n.id === l.source);
    return NODE_COLORS[src?.type] || '#ffffff';
  })
  .onNodeHover(node => {
    hoveredNode = node;
    document.body.style.cursor = node ? 'pointer' : 'default';
    Graph.nodeVal(n => {
      const base = NODE_SIZES[n.type] || 6;
      return (node && node.id === n.id) ? base * 1.6 : base;
    });
  })
  .onNodeClick(node => {
    // Smooth camera fly-to
    const dist = 120;
    const mag = Math.hypot(node.x || 0.001, node.y || 0.001, node.z || 0.001);
    const distRatio = 1 + dist / mag;
    Graph.cameraPosition(
      { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
      node,
      1200
    );

    // Populate and open side panel
    const color = NODE_COLORS[node.type] || '#888';
    document.getElementById('panel-color-bar').style.background = color;
    document.getElementById('panel-color-bar').style.boxShadow = `0 0 10px ${color}55`;
    document.getElementById('panel-title').textContent = node.name;
    document.getElementById('panel-type').textContent = TYPE_LABELS[node.type] || node.type;
    document.getElementById('panel-desc').textContent = node.desc || '—';
    document.getElementById('panel').classList.add('open');
  })
  .onBackgroundClick(() => closePanel())
  .cooldownTicks(120)
  .onEngineStop(() => Graph.zoomToFit(400, 100));

// Stronger repulsion for better spread
Graph.d3Force('charge').strength(-200);

function setLayout(mode) {
  currentLayout = mode;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  if (mode === 'dag') {
    Graph.dagMode('td').dagLevelDistance(90);
    document.getElementById('btn-dag').classList.add('active');
  } else {
    Graph.dagMode(null);
    document.getElementById('btn-3d').classList.add('active');
  }
}

function resetCamera() {
  Graph.cameraPosition({ x: 0, y: 0, z: 500 }, { x: 0, y: 0, z: 0 }, 1000);
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

// Fade out hint after 5 seconds
setTimeout(() => {
  const hint = document.getElementById('hint');
  hint.style.transition = 'opacity 1s';
  hint.style.opacity = '0';
  setTimeout(() => hint.style.display = 'none', 1000);
}, 5000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caleb Caraway — Entity Structure</title>
  <script src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0f1a; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: #dde4ef; }
    #header {
      position: fixed; top: 0; left: 0; right: 0; height: 52px;
      background: rgba(10,15,26,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
      z-index: 100;
    }
    .logo { font-size: 13px; font-weight: 700; color: #f0c040; letter-spacing: 2px; text-transform: uppercase; }
    .subtitle { font-size: 12px; color: rgba(255,255,255,0.4); margin-left: 12px; }
    #graph { width: 100%; height: 100%; padding-top: 52px; }
    .legend {
      position: fixed; bottom: 16px; left: 16px; background: rgba(10,15,26,0.9);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px 16px;
      font-size: 11px; z-index: 100;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
    .info-panel {
      position: fixed; top: 60px; right: 16px; width: 280px;
      background: rgba(10,15,26,0.95); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 16px; font-size: 13px; z-index: 100;
      display: none;
    }
    .info-panel h3 { color: #f0c040; margin-bottom: 8px; font-size: 14px; }
    .info-panel .type-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .info-panel .connections { margin-top: 10px; }
    .info-panel .conn-item { color: rgba(255,255,255,0.6); margin: 3px 0; }
    .close-btn {
      position: absolute; top: 8px; right: 10px; background: none; border: none;
      color: rgba(255,255,255,0.4); cursor: pointer; font-size: 16px;
    }
    .close-btn:hover { color: #fff; }
  </style>
</head>
<body>
  <div id="header">
    <div style="display:flex;align-items:center;">
      <span class="logo">Dark Horse</span>
      <span class="subtitle">Entity Structure — Caleb Caraway</span>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,0.3);">Click a node for details · Scroll to zoom · Drag to pan</div>
  </div>
  <div id="graph"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#f0c040"></div>Trust</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7c8dff"></div>Holdings</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4ecdc4"></div>Family Office</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b"></div>Management Co</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div>Fund</div>
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Operations</div>
    <div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div>Investment</div>
    <div style="margin-top:6px;border-top:1px solid rgba(255,255,255,0.08);padding-top:6px;">
      <div class="legend-item" style="color:rgba(255,255,255,0.4);">── Structural link</div>
      <div class="legend-item" style="color:#ff6b6b;">- - Cross-investment</div>
    </div>
  </div>
  <div class="info-panel" id="info">
    <button class="close-btn" onclick="document.getElementById('info').style.display='none'">✕</button>
    <h3 id="info-label"></h3>
    <div id="info-type" class="type-badge"></div>
    <div class="connections" id="info-connections"></div>
  </div>

  <script>
    const TYPE_COLORS = {
      'trust':         { bg: '#f0c040', border: '#d4a017', font: '#000' },
      'holdings':      { bg: '#7c8dff', border: '#5a6fe0', font: '#fff' },
      'family-office': { bg: '#4ecdc4', border: '#36b3aa', font: '#000' },
      'mgmt':          { bg: '#ff6b6b', border: '#e04545', font: '#fff' },
      'fund':          { bg: '#a855f7', border: '#8b3fd6', font: '#fff' },
      'operations':    { bg: '#22c55e', border: '#16a34a', font: '#fff' },
      'investment':    { bg: '#94a3b8', border: '#6b7a8d', font: '#fff' }
    };

    const TYPE_LABELS = {
      'trust': 'Trust', 'holdings': 'Holdings', 'family-office': 'Family Office',
      'mgmt': 'Management Co', 'fund': 'Fund', 'operations': 'Operations', 'investment': 'Investment'
    };

    fetch('data.json').then(r => r.json()).then(data => {
      const nodes = new vis.DataSet(data.nodes.map(n => {
        const c = TYPE_COLORS[n.type] || TYPE_COLORS['investment'];
        return {
          id: n.id,
          label: n.label.replace(/\\n/g, '\n'),
          font: { color: c.font, size: 13, face: 'Segoe UI, system-ui, sans-serif', multi: 'md', bold: { color: c.font } },
          color: { background: c.bg, border: c.border, highlight: { background: c.bg, border: '#fff' } },
          shape: n.type === 'trust' ? 'diamond' : n.type === 'fund' ? 'box' : 'ellipse',
          size: (n.size || 8) * 3,
          borderWidth: 2,
          borderWidthSelected: 3,
          shadow: { enabled: true, color: 'rgba(0,0,0,0.3)', size: 8 },
          _type: n.type,
          _origLabel: n.label
        };
      }));

      const edges = new vis.DataSet(data.links.map((l, i) => ({
        id: i,
        from: typeof l.source === 'object' ? l.source.id : l.source,
        to: typeof l.target === 'object' ? l.target.id : l.target,
        label: l.label || '',
        font: { color: '#ff6b6b', size: 10, strokeWidth: 2, strokeColor: '#0a0f1a' },
        color: l.linkType === 'cross'
          ? { color: 'rgba(255,107,107,0.6)', highlight: '#ff6b6b' }
          : { color: 'rgba(255,255,255,0.25)', highlight: 'rgba(255,255,255,0.6)' },
        dashes: l.linkType === 'cross' ? [8, 4] : false,
        arrows: { to: { enabled: true, scaleFactor: 0.7 } },
        width: l.linkType === 'cross' ? 1.5 : 2,
        smooth: { type: l.linkType === 'cross' ? 'curvedCW' : 'continuous', roundness: l.linkType === 'cross' ? 0.2 : 0 },
        _linkType: l.linkType
      })));

      const container = document.getElementById('graph');
      const network = new vis.Network(container, { nodes, edges }, {
        layout: {
          hierarchical: {
            enabled: true,
            direction: 'UD',
            sortMethod: 'directed',
            levelSeparation: 140,
            nodeSpacing: 200,
            treeSpacing: 250,
            blockShifting: true,
            edgeMinimization: true
          }
        },
        physics: {
          hierarchicalRepulsion: { nodeDistance: 200, centralGravity: 0.1, springLength: 150 }
        },
        interaction: {
          hover: true,
          tooltipDelay: 100,
          navigationButtons: false,
          keyboard: false,
          zoomView: true,
          dragView: true
        },
        edges: {
          selectionWidth: 2
        }
      });

      // Fit to screen after stabilization
      network.once('stabilizationIterationsDone', () => {
        network.fit({ animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
      });

      // Click handler for info panel
      network.on('click', params => {
        if (params.nodes.length > 0) {
          const nodeId = params.nodes[0];
          const node = nodes.get(nodeId);
          const infoEl = document.getElementById('info');
          const c = TYPE_COLORS[node._type] || TYPE_COLORS['investment'];

          document.getElementById('info-label').textContent = node._origLabel.replace(/\\n/g, ' — ');
          const badge = document.getElementById('info-type');
          badge.textContent = TYPE_LABELS[node._type] || node._type;
          badge.style.background = c.bg;
          badge.style.color = c.font;

          // Find connections
          const connEdges = edges.get().filter(e => e.from === nodeId || e.to === nodeId);
          const connHtml = connEdges.map(e => {
            const otherId = e.from === nodeId ? e.to : e.from;
            const other = nodes.get(otherId);
            const dir = e.from === nodeId ? '→' : '←';
            const linkLabel = e.label ? ` (${e.label})` : '';
            const oc = TYPE_COLORS[other._type] || TYPE_COLORS['investment'];
            return `<div class="conn-item">${dir} <span style="color:${oc.bg}">${other._origLabel.split('\\n')[0]}</span>${linkLabel}</div>`;
          }).join('');

          document.getElementById('info-connections').innerHTML =
            `<div style="color:rgba(255,255,255,0.35);font-size:11px;margin-bottom:4px;">CONNECTIONS (${connEdges.length})</div>` + connHtml;

          infoEl.style.display = 'block';
        }
      });

      // Double-click to focus
      network.on('doubleClick', params => {
        if (params.nodes.length > 0) {
          network.focus(params.nodes[0], { scale: 1.5, animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
        }
      });
    }).catch(err => {
      document.getElementById('graph').innerHTML = '<div style="padding:80px 40px;text-align:center;"><h2 style="color:#ff6b6b;">Failed to load data</h2><p style="color:rgba(255,255,255,0.5);margin-top:12px;">' + err.message + '</p></div>';
    });
  </script>
</body>
</html>

<script>

  ]
};

const COLORS = {
  trust:          '#f0c040',
  holdings:       '#7c8dff',
  'family-office':'#4ecdc4',
  mgmt:           '#ff6b6b',
  fund:           '#a855f7',
  operations:     '#22c55e',
  investment:     '#94a3b8'
};

const STORAGE_KEY = 'dhwm-positions-v1';

// ============================================================
// RENDERER SETUP
// ============================================================
const container = document.getElementById('canvas-container');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setClearColor(0x060a12, 1);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 1, 6000);
camera.position.set(0, 0, 800);

// ============================================================
// ORBIT CONTROLS
// ============================================================
function initControls() {
  if (controls) return; // already set up
  if (typeof THREE.OrbitControls === 'undefined') {
    console.warn('OrbitControls not loaded yet, retrying...');
    setTimeout(initControls, 200);
    return;
  }
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.screenSpacePanning = true;
  controls.minDistance = 80;
  controls.maxDistance = 4000;
  controls.zoomSpeed = 1.2;
  controls.rotateSpeed = 0.8;
  controls.panSpeed = 0.8;
  controls.mouseButtons = {
    LEFT:   THREE.MOUSE.ROTATE,
    MIDDLE: THREE.MOUSE.DOLLY,
    RIGHT:  THREE.MOUSE.PAN
  };
  controls.touches = {
    ONE: THREE.TOUCH.ROTATE,
    TWO: THREE.TOUCH.DOLLY_PAN
  };
  console.log('OrbitControls initialized ✓');
}
let controls = null;
initControls();

// ============================================================
// LIGHTING
// ============================================================
scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.45);
dirLight.position.set(300, 500, 300);
scene.add(dirLight);

// ============================================================
// SCENE GROUPS (edges first so nodes render on top)
// ============================================================
const edgeGroup = new THREE.Group();
const nodeGroup = new THREE.Group();
scene.add(edgeGroup);
scene.add(nodeGroup);

// ============================================================
// APP STATE
// ============================================================
let graphData    = null;
let nodeMap      = {};      // id -> { mesh, data, connections:[ids] }
let edgeObjects  = [];      // [{ line, arrow, srcId, tgtId }]
let nodeMeshes   = [];      // flat array for raycasting
let selectedId   = null;
let currentLayout = 'levelTree';

// ============================================================
// DRAG STATE
// ============================================================
let dragNodeId   = null;
let isDragging   = false;
let mouseDownPos = { x: 0, y: 0 };
let mouseDownTime = 0;
const dragPlane  = new THREE.Plane();
const dragOffset = new THREE.Vector3();
const raycaster  = new THREE.Raycaster();
const ndcMouse   = new THREE.Vector2();

// ============================================================
// HELPERS
// ============================================================
function hex3(hex) { return new THREE.Color(hex); }

function getNodeId(val) {
  return typeof val === 'object' ? val.id : val;
}

function getSavedPositions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e) { return {}; }
}

function savePositions(positions) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(positions)); }
  catch(e) {}
}

// ============================================================
// BUILD GRAPH
// ============================================================
function buildGraph(data) {
  graphData = data;
  nodeMap   = {};
  edgeObjects = [];
  nodeMeshes  = [];

  // Clear groups
  while (edgeGroup.children.length) edgeGroup.remove(edgeGroup.children[0]);
  while (nodeGroup.children.length) nodeGroup.remove(nodeGroup.children[0]);

  // Build adjacency
  const adjMap = {};
  data.nodes.forEach(n => { adjMap[n.id] = []; });
  data.links.forEach(l => {
    const s = getNodeId(l.source), t = getNodeId(l.target);
    if (!adjMap[s]) adjMap[s] = [];
    if (!adjMap[t]) adjMap[t] = [];
    if (!adjMap[s].includes(t)) adjMap[s].push(t);
    if (!adjMap[t].includes(s)) adjMap[t].push(s);
  });

  // Create node meshes
  data.nodes.forEach(nodeData => {
    const lines    = nodeData.label.split('\n');
    const line1    = lines[0] || '';
    const line2    = lines[1] || '';
    const nodeColor = COLORS[nodeData.type] || '#888888';

    const boxW = Math.max(80, line1.length * 7 + 20);
    const boxH = 22;
    const boxD = 8;

    const geo = new THREE.BoxGeometry(boxW, boxH, boxD);
    const mat = new THREE.MeshPhongMaterial({
      color:            hex3(nodeColor),
      emissive:         hex3(nodeColor),
      emissiveIntensity: 0.12,
      transparent:      true,
      opacity:          0.88,
      shininess:        35
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = { id: nodeData.id, type: 'node', baseColor: nodeColor, boxW, boxH };

    // --- SpriteText labels ---
    if (typeof SpriteText !== 'undefined') {
      const sp1 = new SpriteText(line1);
      sp1.color      = '#ffffff';
      sp1.fontWeight = 'bold';
      sp1.textHeight = 6.5;
      sp1.padding    = 0;
      sp1.backgroundColor = false;
      sp1.position.set(0, boxH * 0.5 + 7, 0);
      mesh.add(sp1);

      if (line2) {
        const sp2 = new SpriteText(line2);
        sp2.color      = '#aaaaaa';
        sp2.textHeight = 5;
        sp2.padding    = 0;
        sp2.backgroundColor = false;
        sp2.position.set(0, boxH * 0.5 + 16, 0);
        mesh.add(sp2);
      }
    } else {
      // Canvas-sprite fallback
      addCanvasLabel(mesh, line1, line2, boxH);
    }

    nodeGroup.add(mesh);
    nodeMeshes.push(mesh);

    nodeMap[nodeData.id] = {
      mesh,
      data:        nodeData,
      connections: adjMap[nodeData.id] || []
    };
  });

  // Apply layout (sets mesh positions)
  applyLayout(currentLayout, false);

  // Create edges (after positions are set)
  createEdges();
}

// ============================================================
// CANVAS LABEL FALLBACK (no SpriteText)
// ============================================================
function addCanvasLabel(mesh, line1, line2, boxH) {
  const canvas  = document.createElement('canvas');
  canvas.width  = 512;
  canvas.height = line2 ? 100 : 60;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 32px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(line1, 256, 36);

  if (line2) {
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '24px Inter, system-ui, sans-serif';
    ctx.fillText(line2, 256, 72);
  }

  const tex     = new THREE.CanvasTexture(canvas);
  const spGeo   = new THREE.PlaneGeometry(canvas.width * 0.18, canvas.height * 0.18);
  const spMat   = new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false });
  const spMesh  = new THREE.Mesh(spGeo, spMat);
  spMesh.position.set(0, boxH * 0.5 + 12, 1);
  mesh.add(spMesh);
}

// ============================================================
// BFS DEPTHS
// ============================================================
function getBfsData(data) {
  // Find structural children map
  const childrenMap = {};
  data.nodes.forEach(n => { childrenMap[n.id] = []; });
  data.links.forEach(l => {
    if (l.linkType === 'structural') {
      const s = getNodeId(l.source), t = getNodeId(l.target);
      if (!childrenMap[s]) childrenMap[s] = [];
      childrenMap[s].push(t);
    }
  });

  // Root = node with no incoming structural edges
  const hasParent = new Set();
  data.links.forEach(l => {
    if (l.linkType === 'structural') hasParent.add(getNodeId(l.target));
  });
  let rootId = data.nodes.find(n => !hasParent.has(n.id))?.id ?? data.nodes[0].id;

  // BFS
  const depths = {};
  const queue  = [rootId];
  depths[rootId] = 0;
  while (queue.length) {
    const cur = queue.shift();
    (childrenMap[cur] || []).forEach(child => {
      if (depths[child] === undefined) {
        depths[child] = depths[cur] + 1;
        queue.push(child);
      }
    });
  }

  // Unreachable nodes: assign max + 1
  const maxD = Math.max(0, ...Object.values(depths));
  data.nodes.forEach(n => { if (depths[n.id] === undefined) depths[n.id] = maxD + 1; });

  return { depths, rootId, childrenMap };
}

// ============================================================
// LAYOUTS
// ============================================================
function computeLayout(layoutName, data) {
  const positions = {};

  // ---- 1. Level Tree ----
  if (layoutName === 'levelTree') {
    const { depths } = getBfsData(data);
    const maxDepth   = Math.max(0, ...Object.values(depths));

    const byDepth = {};
    data.nodes.forEach(n => {
      const d = depths[n.id];
      if (!byDepth[d]) byDepth[d] = [];
      byDepth[d].push(n.id);
    });

    const LEVEL_H  = 150;
    const H_GAP    = 170;

    Object.entries(byDepth).forEach(([dStr, ids]) => {
      const d     = parseInt(dStr);
      const count = ids.length;
      const y     = (maxDepth - d) * LEVEL_H;
      ids.forEach((nid, i) => {
        positions[nid] = { x: (i - (count - 1) / 2) * H_GAP, y, z: 0 };
      });
    });

  // ---- 2. Both Sides ----
  } else if (layoutName === 'bothSides') {
    const { depths } = getBfsData(data);
    const maxDepth   = Math.max(0, ...Object.values(depths));

    const byDepth = {};
    data.nodes.forEach(n => {
      const d = depths[n.id];
      if (!byDepth[d]) byDepth[d] = [];
      byDepth[d].push(n.id);
    });

    const LEVEL_H = 145;
    const H_GAP   = 185;

    Object.entries(byDepth).forEach(([dStr, ids]) => {
      const d     = parseInt(dStr);
      const count = ids.length;
      const y     = (maxDepth / 2 - d) * LEVEL_H;

      ids.forEach((nid, i) => {
        let x, z;
        if (count === 1) {
          x = 0; z = 0;
        } else {
          const side = (i % 2 === 0) ? 1 : -1;
          const step = Math.ceil((i + 1) / 2);
          x = side * step * H_GAP * 0.6;
          z = (i % 4 < 2) ? 35 : -35;
        }
        positions[nid] = { x, y, z };
      });
    });

  // ---- 3. Radial 3D ----
  } else if (layoutName === 'radial3d') {
    const { depths } = getBfsData(data);

    const byDepth = {};
    data.nodes.forEach(n => {
      const d = depths[n.id];
      if (!byDepth[d]) byDepth[d] = [];
      byDepth[d].push(n.id);
    });

    const RADII  = [0,   200, 390, 540, 670];
    const YLEVS  = [200, 95,   0, -100, -200];

    Object.entries(byDepth).forEach(([dStr, ids]) => {
      const d     = parseInt(dStr);
      const count = ids.length;
      const r     = RADII[Math.min(d, RADII.length - 1)];
      const y     = YLEVS[Math.min(d, YLEVS.length - 1)];

      ids.forEach((nid, i) => {
        if (d === 0) {
          positions[nid] = { x: 0, y, z: 0 };
        } else {
          const angle = (2 * Math.PI * i) / count - Math.PI / 2;
          positions[nid] = { x: Math.cos(angle) * r, y, z: Math.sin(angle) * r };
        }
      });
    });

  // ---- 4. Spherical ----
  } else if (layoutName === 'spherical') {
    const n           = data.nodes.length;
    const R           = 290;
    const goldenAngle = Math.PI * (3 - Math.sqrt(5));

    data.nodes.forEach((node, i) => {
      const yNorm      = 1 - (2 * i + 1) / n;
      const y          = yNorm * R;
      const radiusAtY  = Math.sqrt(Math.max(0, R * R - y * y));
      const theta      = goldenAngle * i;
      positions[node.id] = { x: Math.cos(theta) * radiusAtY, y, z: Math.sin(theta) * radiusAtY };
    });
  }

  return positions;
}

function applyLayout(layoutName, resetCamera) {
  currentLayout = layoutName;
  if (!graphData) return;

  const positions      = computeLayout(layoutName, graphData);
  const savedPositions = getSavedPositions();

  graphData.nodes.forEach(n => {
    const obj = nodeMap[n.id];
    if (!obj) return;

    if (savedPositions[n.id]) {
      const sp = savedPositions[n.id];
      obj.mesh.position.set(sp.x, sp.y, sp.z);
    } else if (positions[n.id]) {
      const p = positions[n.id];
      obj.mesh.position.set(p.x, p.y, p.z);
    }
  });

  if (resetCamera !== false) setCameraForLayout(layoutName);
  updateEdges();
}

function setCameraForLayout(layoutName) {
  if (!controls) return;
  const presets = {
    levelTree: { pos: [0, 0, 820],  target: [0, 0, 0] },
    bothSides: { pos: [0, 0, 950],  target: [0, 0, 0] },
    radial3d:  { pos: [0, 320, 620], target: [0, 50, 0] },
    spherical: { pos: [0, 0, 660],  target: [0, 0, 0] }
  };
  const p = presets[layoutName] || presets.levelTree;
  camera.position.set(...p.pos);
  controls.target.set(...p.target);
  controls.update();
}

// ============================================================
// EDGES
// ============================================================
function createEdges() {
  while (edgeGroup.children.length) edgeGroup.remove(edgeGroup.children[0]);
  edgeObjects = [];
  if (!graphData) return;

  graphData.links.forEach(link => {
    const srcId = getNodeId(link.source);
    const tgtId = getNodeId(link.target);
    const src   = nodeMap[srcId];
    const tgt   = nodeMap[tgtId];
    if (!src || !tgt) return;

    const isStruct = link.linkType === 'structural';
    const lineColor = isStruct ? 0xffffff : 0xff6b6b;
    const lineAlpha = isStruct ? 0.40    : 0.35;

    // Line
    const pts = [src.mesh.position.clone(), tgt.mesh.position.clone()];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({ color: lineColor, transparent: true, opacity: lineAlpha });
    const line = new THREE.Line(geo, mat);
    edgeGroup.add(line);

    // Arrow cone at target
    const dir       = new THREE.Vector3().subVectors(tgt.mesh.position, src.mesh.position).normalize();
    const arrowGeo  = new THREE.ConeGeometry(3.5, 11, 6);
    const arrowMat  = new THREE.MeshBasicMaterial({ color: lineColor, transparent: true, opacity: isStruct ? 0.5 : 0.45 });
    const arrow     = new THREE.Mesh(arrowGeo, arrowMat);
    arrow.position.copy(tgt.mesh.position.clone().sub(dir.clone().multiplyScalar(18)));
    arrow.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
    edgeGroup.add(arrow);

    edgeObjects.push({ line, arrow, srcId, tgtId });
  });
}

function updateEdges() {
  edgeObjects.forEach(({ line, arrow, srcId, tgtId }) => {
    const src = nodeMap[srcId];
    const tgt = nodeMap[tgtId];
    if (!src || !tgt) return;

    const sp = src.mesh.position;
    const tp = tgt.mesh.position;

    // Update line geometry
    const attr = line.geometry.attributes.position;
    attr.setXYZ(0, sp.x, sp.y, sp.z);
    attr.setXYZ(1, tp.x, tp.y, tp.z);
    attr.needsUpdate = true;
    line.geometry.computeBoundingSphere();

    // Update arrow
    const dir = new THREE.Vector3().subVectors(tp, sp).normalize();
    arrow.position.copy(tp.clone().sub(dir.clone().multiplyScalar(18)));
    if (dir.lengthSq() > 0.001) {
      arrow.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
    }
  });
}

// ============================================================
// SELECTION
// ============================================================
function selectNode(id) {
  // Deselect previous
  if (selectedId !== null && nodeMap[selectedId]) {
    const prev = nodeMap[selectedId].mesh;
    prev.material.emissiveIntensity = 0.12;
    prev.scale.set(1, 1, 1);
  }

  selectedId = id;

  if (id !== null && nodeMap[id]) {
    const mesh = nodeMap[id].mesh;
    mesh.material.emissiveIntensity = 0.55;
    mesh.scale.set(1.1, 1.1, 1.1);
    showInfoPanel(id);
  } else {
    document.getElementById('info-panel').style.display = 'none';
  }
}

function showInfoPanel(id) {
  const obj  = nodeMap[id];
  if (!obj) return;
  const d    = obj.data;
  const lbls = d.label.split('\n');

  document.getElementById('infoName').textContent = lbls.join(' ');
  document.getElementById('infoType').textContent = d.type.replace(/-/g, ' ');

  const connsDiv = document.getElementById('infoConns');
  connsDiv.innerHTML = '';
  obj.connections.forEach(cid => {
    const cn = nodeMap[cid];
    if (!cn) return;
    const div = document.createElement('div');
    div.className = 'info-conn-item';
    div.textContent = '→ ' + cn.data.label.split('\n')[0];
    connsDiv.appendChild(div);
  });

  document.getElementById('info-panel').style.display = 'block';
}

// ============================================================
// SEARCH
// ============================================================
function applySearch(query) {
  if (!graphData) return;
  const q = query.toLowerCase().trim();

  graphData.nodes.forEach(n => {
    const obj = nodeMap[n.id];
    if (!obj) return;
    const mat = obj.mesh.material;

    if (!q) {
      mat.opacity = 0.88;
      if (n.id !== selectedId) mat.emissiveIntensity = 0.12;
    } else {
      const hit = n.label.toLowerCase().includes(q) || n.type.toLowerCase().includes(q);
      mat.opacity           = hit ? 1.0 : 0.18;
      mat.emissiveIntensity = hit ? 0.4 : 0.03;
    }
  });
}

// ============================================================
// MOUSE HELPERS
// ============================================================
function getMouseNDC(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  ndcMouse.set(
    ((e.clientX - rect.left) / rect.width)  *  2 - 1,
    ((e.clientY - rect.top)  / rect.height) * -2 + 1
  );
  return ndcMouse;
}

function hitTestNodes(e) {
  raycaster.setFromCamera(getMouseNDC(e), camera);
  const hits = raycaster.intersectObjects(nodeMeshes);
  return hits.length > 0 ? hits[0].object : null;
}

// ============================================================
// MOUSE EVENTS
// ============================================================
renderer.domElement.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  mouseDownPos  = { x: e.clientX, y: e.clientY };
  mouseDownTime = Date.now();

  const hitMesh = hitTestNodes(e);
  if (hitMesh) {
    dragNodeId = hitMesh.userData.id;
    isDragging = false;

    // Set drag plane at node's Y
    dragPlane.setFromNormalAndCoplanarPoint(
      new THREE.Vector3(0, 1, 0),
      hitMesh.position
    );

    // Compute offset
    raycaster.setFromCamera(getMouseNDC(e), camera);
    const pt = new THREE.Vector3();
    raycaster.ray.intersectPlane(dragPlane, pt);
    dragOffset.subVectors(hitMesh.position, pt);

    if (controls) controls.enabled = false;
  }
});

renderer.domElement.addEventListener('mousemove', e => {
  if (dragNodeId === null) return;

  const dx = e.clientX - mouseDownPos.x;
  const dy = e.clientY - mouseDownPos.y;
  if (!isDragging && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) isDragging = true;
  if (!isDragging) return;

  raycaster.setFromCamera(getMouseNDC(e), camera);
  const pt = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(dragPlane, pt)) {
    const obj = nodeMap[dragNodeId];
    if (obj) {
      const newPos = pt.add(dragOffset);
      obj.mesh.position.set(newPos.x, obj.mesh.position.y, newPos.z);
      updateEdges();
    }
  }
});

renderer.domElement.addEventListener('mouseup', e => {
  if (dragNodeId !== null && isDragging) {
    // Persist position
    const saved = getSavedPositions();
    const obj   = nodeMap[dragNodeId];
    if (obj) {
      const p = obj.mesh.position;
      saved[dragNodeId] = { x: p.x, y: p.y, z: p.z };
      savePositions(saved);
    }
  }
  if (controls) controls.enabled = true;
  dragNodeId = null;
  isDragging = false;
});

renderer.domElement.addEventListener('click', e => {
  const dx = e.clientX - mouseDownPos.x;
  const dy = e.clientY - mouseDownPos.y;
  if (Math.abs(dx) > 5 || Math.abs(dy) > 5) return;     // was a drag
  if (Date.now() - mouseDownTime > 350) return;            // too slow

  const hitMesh = hitTestNodes(e);
  if (hitMesh) {
    const id = hitMesh.userData.id;
    selectNode(id === selectedId ? null : id);
  } else {
    selectNode(null);
  }
});

// ============================================================
// TOOLBAR EVENTS
// ============================================================
document.querySelectorAll('.layout-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyLayout(btn.dataset.layout, true);
    createEdges();
  });
});

document.getElementById('resetBtn').addEventListener('click', () => {
  localStorage.removeItem(STORAGE_KEY);
  applyLayout(currentLayout, true);
  createEdges();
});

document.getElementById('search').addEventListener('input', e => applySearch(e.target.value));

document.getElementById('infoClose').addEventListener('click', () => selectNode(null));

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// ============================================================
// RENDER LOOP
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  if (controls) controls.update();
  renderer.render(scene, camera);
}
animate();

// ============================================================
// LOAD DATA
// ============================================================
async function loadData() {
  try {
    const resp = await fetch('data.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    buildGraph(data);
  } catch(err) {
    console.log('Falling back to DEFAULTS:', err.message);
    buildGraph(DEFAULTS);
  }
}

// Ensure OrbitControls is initialized even if CDN loaded late
window.addEventListener('load', () => { initControls(); });
loadData();
</script>

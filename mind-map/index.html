<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Horse — Org Map</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0c14; overflow:hidden; font-family:'Segoe UI',sans-serif; }
canvas { display:block; }

#toolbar {
  position:fixed; top:16px; left:16px; z-index:100;
  display:flex; flex-direction:column; gap:8px;
}
.tool-section {
  background:rgba(10,12,20,0.88); border:1px solid rgba(255,255,255,0.1);
  border-radius:10px; padding:10px 12px;
  backdrop-filter:blur(12px);
}
.tool-label {
  color:rgba(255,255,255,0.45); font-size:10px; text-transform:uppercase;
  letter-spacing:1px; margin-bottom:6px;
}
.btn-row { display:flex; gap:6px; flex-wrap:wrap; }
.btn {
  background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.8); font-size:11px; padding:5px 10px;
  border-radius:6px; cursor:pointer; transition:all 0.2s; white-space:nowrap;
}
.btn:hover { background:rgba(255,255,255,0.15); border-color:rgba(255,255,255,0.3); }
.btn.active {
  background:rgba(100,160,255,0.25); border-color:rgba(100,160,255,0.6);
  color:#fff;
}

#legend {
  position:fixed; bottom:16px; left:16px; z-index:100;
  background:rgba(10,12,20,0.88); border:1px solid rgba(255,255,255,0.1);
  border-radius:10px; padding:12px 16px;
  backdrop-filter:blur(12px);
}
.legend-item { display:flex; align-items:center; gap:8px; color:rgba(255,255,255,0.7); font-size:11px; margin-bottom:4px; }
.legend-dot { width:10px; height:10px; border-radius:50%; }

#tooltip {
  position:fixed; pointer-events:none; z-index:200;
  background:rgba(10,12,20,0.95); border:1px solid rgba(100,160,255,0.4);
  border-radius:8px; padding:10px 14px;
  color:#fff; font-size:12px; line-height:1.5;
  max-width:260px; display:none;
  backdrop-filter:blur(16px);
}

#save-indicator {
  position:fixed; top:16px; right:16px; z-index:100;
  background:rgba(10,12,20,0.88); border:1px solid rgba(100,255,150,0.3);
  border-radius:8px; padding:6px 14px; color:rgba(100,255,150,0.9);
  font-size:11px; display:none;
}
</style>
</head>
<body>
<div id="toolbar">
  <div class="tool-section">
    <div class="tool-label">Layout</div>
    <div class="btn-row">
      <button class="btn active" id="btn-cylinder" onclick="setLayout('cylinder')">⬡ Cylinder</button>
      <button class="btn" id="btn-radial"   onclick="setLayout('radial')">⊛ Radial</button>
      <button class="btn" id="btn-cascade"  onclick="setLayout('cascade')">↧ Cascade</button>
      <button class="btn" id="btn-sphere"   onclick="setLayout('sphere')">◎ Globe</button>
    </div>
  </div>
  <div class="tool-section">
    <div class="tool-label">Node Shape</div>
    <div class="btn-row">
      <button class="btn active" id="shape-sphere"   onclick="setShape('sphere')">● Sphere</button>
      <button class="btn" id="shape-box"      onclick="setShape('box')">■ Cube</button>
      <button class="btn" id="shape-cylinder" onclick="setShape('cylinder')">⬤ Pillar</button>
      <button class="btn" id="shape-cone"     onclick="setShape('cone')">▲ Cone</button>
      <button class="btn" id="shape-diamond"  onclick="setShape('diamond')">◆ Diamond</button>
      <button class="btn" id="shape-torus"    onclick="setShape('torus')">⊙ Ring</button>
    </div>
  </div>
  <div class="tool-section">
    <div class="tool-label">Actions</div>
    <div class="btn-row">
      <button class="btn" onclick="resetCamera()">↺ Reset View</button>
      <button class="btn" onclick="clearSaved()">✕ Clear Saved</button>
    </div>
  </div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#f5c842"></div>Trust / Holdings</div>
  <div class="legend-item"><div class="legend-dot" style="background:#64a0ff"></div>Family Office / RIA</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a06aff"></div>Management / GP</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3bd68a"></div>Fund Vehicle</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff7c4a"></div>Operations / Investment</div>
  <div class="legend-item"><div class="legend-dot" style="background:#888"></div>Dormant</div>
</div>

<div id="tooltip"></div>
<div id="save-indicator">✓ Layout Saved</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.146.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ─── Scene Setup ───────────────────────────────────────────────────────────
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x0a0c14);
scene.fog        = new THREE.FogExp2(0x0a0c14, 0.018);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0, 60, 120);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping    = true;
controls.dampingFactor    = 0.08;
controls.minDistance      = 20;
controls.maxDistance      = 500;
controls.autoRotate       = false;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dir1 = new THREE.DirectionalLight(0xffffff, 0.8);
dir1.position.set(80, 120, 60);
scene.add(dir1);
const dir2 = new THREE.DirectionalLight(0x6080ff, 0.4);
dir2.position.set(-80, -40, -60);
scene.add(dir2);
const pt = new THREE.PointLight(0x4060ff, 1.5, 300);
pt.position.set(0, 80, 0);
scene.add(pt);

// ─── Data ──────────────────────────────────────────────────────────────────
const COLORS = {
  'trust':        0xf5c842,
  'holdings':     0xf5c842,
  'family-office':0x64a0ff,
  'mgmt':         0xa06aff,
  'fund':         0x3bd68a,
  'operations':   0xff7c4a,
  'investment':   0xff7c4a
};

function isDormant(label) { return label.includes('DORMANT'); }

let graphData = null;
let currentLayout = 'cylinder';
let currentShape  = 'sphere';
let nodeObjects   = {};  // id -> mesh
let edgeObjects   = [];
let nodePositions = {};  // id -> THREE.Vector3 (final/saved)
const STORAGE_KEY = 'dhwm-positions-v2';

// ─── Load Data ─────────────────────────────────────────────────────────────
fetch('data.json').then(r=>r.json()).then(data => {
  graphData = data;
  buildGraph();
});

// ─── Graph Build ───────────────────────────────────────────────────────────
function buildGraph() {
  // Clear scene objects
  Object.values(nodeObjects).forEach(m => {
    scene.remove(m);
    if(m.labelSprite) scene.remove(m.labelSprite);
  });
  edgeObjects.forEach(e => scene.remove(e));
  nodeObjects = {};
  edgeObjects = [];

  const saved = getSavedPositions();
  const positions = computeLayout(graphData, currentLayout);

  // Build node meshes
  graphData.nodes.forEach(node => {
    const pos = saved[node.id] || positions[node.id] || new THREE.Vector3(0,0,0);
    nodePositions[node.id] = pos.clone();
    const mesh = createNodeMesh(node, pos);
    nodeObjects[node.id] = mesh;
    scene.add(mesh);
    const label = makeLabel(node.label, node.type, isDormant(node.label));
    label.position.copy(pos);
    label.position.y += getNodeRadius(node) + 3;
    mesh.labelSprite = label;
    scene.add(label);
  });

  // Build edges
  graphData.links.forEach(link => {
    const srcPos = nodePositions[link.source];
    const tgtPos = nodePositions[link.target];
    if(!srcPos || !tgtPos) return;
    const isCross = link.linkType === 'cross';
    const edge = makeTube(srcPos, tgtPos, isCross);
    scene.add(edge);
    edgeObjects.push(edge);
  });
}

// ─── Layout Algorithms ─────────────────────────────────────────────────────
function computeLayout(data, mode) {
  const positions = {};
  const nodes = data.nodes;
  const links = data.links;

  // Build adjacency for tree depth
  const children = {};
  const parents  = {};
  nodes.forEach(n => { children[n.id] = []; });
  links.filter(l=>l.linkType==='structural').forEach(l => {
    if(children[l.source]) children[l.source].push(l.target);
    parents[l.target] = l.source;
  });

  // Find roots
  const allTargets = new Set(links.filter(l=>l.linkType==='structural').map(l=>l.target));
  const roots = nodes.filter(n => !allTargets.has(n.id)).map(n=>n.id);

  // BFS to assign depths
  const depth = {};
  const depthGroups = {};
  const queue = [...roots];
  roots.forEach(r => { depth[r] = 0; });
  while(queue.length) {
    const id = queue.shift();
    const d = depth[id];
    if(!depthGroups[d]) depthGroups[d] = [];
    depthGroups[d].push(id);
    (children[id]||[]).forEach(c => {
      if(depth[c] === undefined) {
        depth[c] = d + 1;
        queue.push(c);
      }
    });
  }
  const maxDepth = Math.max(...Object.values(depth));

  if(mode === 'cylinder') {
    // Cylindrical: each depth is a circle, stacked top-to-bottom
    const LEVEL_HEIGHT = 28;
    const BASE_RADIUS  = 22;
    const RADIUS_SCALE = 9;

    Object.keys(depthGroups).forEach(d => {
      const lvl = parseInt(d);
      const ids = depthGroups[d];
      const y   = (maxDepth - lvl) * LEVEL_HEIGHT - (maxDepth * LEVEL_HEIGHT / 2);
      const r   = lvl === 0 ? 0 : BASE_RADIUS + RADIUS_SCALE * Math.sqrt(ids.length);

      ids.forEach((id, i) => {
        // Group by parent for visual clustering
        const angle = (2 * Math.PI * i / ids.length) - Math.PI/2;
        const x = r * Math.cos(angle);
        const z = r * Math.sin(angle);
        positions[id] = new THREE.Vector3(x, y, z);
      });
    });

  } else if(mode === 'radial') {
    // Radial 3D: nodes orbit around centre by depth
    const LEVEL_R = 30;
    Object.keys(depthGroups).forEach(d => {
      const lvl = parseInt(d);
      const ids = depthGroups[d];
      const r   = lvl * LEVEL_R;
      ids.forEach((id, i) => {
        const theta = (2 * Math.PI * i / Math.max(ids.length,1));
        const phi   = (Math.PI * (lvl+1)) / (maxDepth+2);
        positions[id] = new THREE.Vector3(
          r * Math.sin(phi) * Math.cos(theta),
          r * Math.cos(phi),
          r * Math.sin(phi) * Math.sin(theta)
        );
      });
    });

  } else if(mode === 'cascade') {
    // Cascading waterfall: root at top, children fan out below and offset
    const LEVEL_HEIGHT = 30;
    const SPREAD = 25;
    Object.keys(depthGroups).forEach(d => {
      const lvl = parseInt(d);
      const ids = depthGroups[d];
      const y   = -lvl * LEVEL_HEIGHT;
      const totalW = (ids.length - 1) * SPREAD;
      ids.forEach((id, i) => {
        const x = -totalW/2 + i*SPREAD;
        const z = lvl % 2 === 0 ? 0 : (Math.random()-0.5)*10;
        positions[id] = new THREE.Vector3(x, y, z);
      });
    });

  } else if(mode === 'sphere') {
    // Globe: nodes on surface of expanding sphere by depth
    const R = 80;
    nodes.forEach((node, i) => {
      const phi   = Math.acos(1 - 2*(i+0.5)/nodes.length);
      const theta = Math.PI * (1 + Math.sqrt(5)) * i;
      const r = 20 + (depth[node.id]||0) * 12;
      positions[node.id] = new THREE.Vector3(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.cos(phi),
        r * Math.sin(phi) * Math.sin(theta)
      );
    });
  }

  return positions;
}

// ─── Node Mesh Factory ─────────────────────────────────────────────────────
function getNodeRadius(node) {
  return Math.max(3, (node.size||6) * 0.55);
}

function createNodeMesh(node, pos) {
  const r     = getNodeRadius(node);
  const color = isDormant(node.label) ? 0x555566 : (COLORS[node.type] || 0x888888);
  const geo   = makeGeometry(currentShape, r);
  const mat   = new THREE.MeshPhongMaterial({
    color,
    emissive: new THREE.Color(color).multiplyScalar(0.18),
    shininess: 80,
    transparent: true,
    opacity: isDormant(node.label) ? 0.5 : 0.92
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  mesh.userData = { nodeId: node.id, node, origColor: color };
  return mesh;
}

function makeGeometry(shape, r) {
  switch(shape) {
    case 'box':      return new THREE.BoxGeometry(r*1.6, r*1.6, r*1.6);
    case 'cylinder': return new THREE.CylinderGeometry(r*0.7, r*0.9, r*2, 12);
    case 'cone':     return new THREE.ConeGeometry(r, r*2.2, 10);
    case 'diamond':  return new THREE.OctahedronGeometry(r*1.1);
    case 'torus':    return new THREE.TorusGeometry(r*0.9, r*0.35, 10, 20);
    default:         return new THREE.SphereGeometry(r, 18, 14);
  }
}

// ─── Labels ────────────────────────────────────────────────────────────────
function makeLabel(text, type, dormant) {
  const lines   = text.split('\n');
  const w=512, h=160;
  const canvas  = document.createElement('canvas');
  canvas.width  = w; canvas.height = h;
  const ctx     = canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);

  // Background pill
  ctx.fillStyle = dormant ? 'rgba(20,20,30,0.7)' : 'rgba(10,12,24,0.82)';
  const rx=14;
  ctx.beginPath();
  ctx.moveTo(rx,0); ctx.lineTo(w-rx,0);
  ctx.arcTo(w,0,w,h,rx); ctx.lineTo(w,h-rx);
  ctx.arcTo(w,h,0,h,rx); ctx.lineTo(rx,h);
  ctx.arcTo(0,h,0,0,rx); ctx.lineTo(0,rx);
  ctx.arcTo(0,0,w,0,rx); ctx.closePath();
  ctx.fill();

  const color = dormant ? '#777' : (COLORS[type] ? '#'+COLORS[type].toString(16).padStart(6,'0') : '#aaa');
  const fontSize = lines.length > 2 ? 22 : 26;
  ctx.font = `bold ${fontSize}px Segoe UI`;
  ctx.textAlign = 'center';
  ctx.fillStyle = color;
  const lineH = fontSize + 6;
  const startY = (h - lines.length * lineH) / 2 + fontSize;
  lines.forEach((ln, i) => {
    ctx.fillText(ln, w/2, startY + i*lineH);
  });

  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map:tex, transparent:true, depthWrite:false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(22, 7, 1);
  return sprite;
}

// ─── Tube Edges ────────────────────────────────────────────────────────────
function makeTube(src, tgt, cross) {
  // Curved path
  const mid = src.clone().lerp(tgt, 0.5);
  mid.y += cross ? 15 : 8;
  const curve = new THREE.QuadraticBezierCurve3(src, mid, tgt);
  const geo   = new THREE.TubeGeometry(curve, 16, cross ? 0.18 : 0.28, 6, false);
  const mat   = new THREE.MeshBasicMaterial({
    color: cross ? 0x4466aa : 0x334466,
    transparent: true,
    opacity: cross ? 0.35 : 0.55
  });
  return new THREE.Mesh(geo, mat);
}

// ─── Interaction ───────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();
let   hoveredId = null;
let   dragging  = null;
let   dragOffset = new THREE.Vector3();
let   isDragging = false;
const dragPlane  = new THREE.Plane();

renderer.domElement.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX/innerWidth)*2  - 1;
  mouse.y = -(e.clientY/innerHeight)*2 + 1;

  if(dragging) {
    isDragging = true;
    raycaster.setFromCamera(mouse, camera);
    const pt = new THREE.Vector3();
    raycaster.ray.intersectPlane(dragPlane, pt);
    dragging.mesh.position.copy(pt.clone().add(dragOffset));
    dragging.mesh.labelSprite.position.copy(dragging.mesh.position.clone().setY(
      dragging.mesh.position.y + getNodeRadius(dragging.node) + 3
    ));
    nodePositions[dragging.node.id] = dragging.mesh.position.clone();
    rebuildEdges();
    return;
  }

  // Hover
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(Object.values(nodeObjects));
  const tip  = document.getElementById('tooltip');
  if(hits.length) {
    const m = hits[0].object;
    const n = m.userData.node;
    if(!n) return;
    tip.innerHTML = `<b style="color:#64a0ff">${n.label.replace(/\n/g,'<br>')}</b><br>
      <span style="color:#aaa;font-size:11px">Type: ${n.type}</span>`;
    tip.style.display = 'block';
    tip.style.left = (e.clientX+14)+'px';
    tip.style.top  = (e.clientY-10)+'px';
    if(hoveredId !== n.id) {
      if(hoveredId!==null && nodeObjects[hoveredId])
        nodeObjects[hoveredId].material.emissive.set(
          new THREE.Color(nodeObjects[hoveredId].userData.origColor).multiplyScalar(0.18));
      m.material.emissive.set(new THREE.Color(m.userData.origColor).multiplyScalar(0.55));
      hoveredId = n.id;
    }
  } else {
    tip.style.display = 'none';
    if(hoveredId!==null && nodeObjects[hoveredId])
      nodeObjects[hoveredId].material.emissive.set(
        new THREE.Color(nodeObjects[hoveredId].userData.origColor).multiplyScalar(0.18));
    hoveredId = null;
  }
});

renderer.domElement.addEventListener('mousedown', e => {
  if(e.button !== 0) return;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(Object.values(nodeObjects));
  if(hits.length) {
    const m = hits[0].object;
    if(!m.userData.node) return;
    e.stopPropagation();
    controls.enabled = false;
    dragging = { mesh: m, node: m.userData.node };
    isDragging = false;
    // Set drag plane perpendicular to camera
    dragPlane.setFromNormalAndCoplanarPoint(
      camera.getWorldDirection(new THREE.Vector3()).negate(),
      m.position
    );
    raycaster.ray.intersectPlane(dragPlane, dragOffset);
    dragOffset.sub(m.position);
  }
});

renderer.domElement.addEventListener('mouseup', () => {
  if(dragging && isDragging) savePositions();
  dragging   = null;
  isDragging = false;
  controls.enabled = true;
});

// ─── Edge Rebuild ──────────────────────────────────────────────────────────
function rebuildEdges() {
  edgeObjects.forEach(e => scene.remove(e));
  edgeObjects = [];
  graphData.links.forEach(link => {
    const src = nodePositions[link.source];
    const tgt = nodePositions[link.target];
    if(!src||!tgt) return;
    const e = makeTube(src, tgt, link.linkType==='cross');
    scene.add(e);
    edgeObjects.push(e);
  });
}

// ─── Position Persistence ─────────────────────────────────────────────────
function savePositions() {
  const saved = {};
  Object.entries(nodePositions).forEach(([id,v]) => {
    saved[id] = { x:v.x, y:v.y, z:v.z };
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  const ind = document.getElementById('save-indicator');
  ind.style.display = 'block';
  setTimeout(() => { ind.style.display='none'; }, 2000);
}

function getSavedPositions() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return {};
    const parsed = JSON.parse(raw);
    const out = {};
    Object.entries(parsed).forEach(([id,v]) => {
      out[parseInt(id)] = new THREE.Vector3(v.x, v.y, v.z);
    });
    return out;
  } catch(e) { return {}; }
}

function clearSaved() {
  localStorage.removeItem(STORAGE_KEY);
  buildGraph();
}

// ─── Controls ──────────────────────────────────────────────────────────────
function setLayout(mode) {
  currentLayout = mode;
  localStorage.removeItem(STORAGE_KEY);
  document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-'+mode).classList.add('active');
  buildGraph();
  resetCamera();
}

function setShape(shape) {
  currentShape = shape;
  document.querySelectorAll('[id^="shape-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('shape-'+shape).classList.add('active');
  // Rebuild geometry for all nodes
  graphData.nodes.forEach(node => {
    const m = nodeObjects[node.id];
    if(!m) return;
    m.geometry.dispose();
    m.geometry = makeGeometry(shape, getNodeRadius(node));
  });
}

function resetCamera() {
  if(currentLayout === 'cylinder') {
    camera.position.set(0, 80, 150);
  } else if(currentLayout === 'radial') {
    camera.position.set(80, 60, 120);
  } else if(currentLayout === 'sphere') {
    camera.position.set(0, 0, 200);
  } else {
    camera.position.set(0, 60, 180);
  }
  camera.lookAt(0, 0, 0);
  controls.target.set(0, 0, 0);
  controls.update();
}

// ─── Grid Floor ────────────────────────────────────────────────────────────
const gridHelper = new THREE.GridHelper(400, 40, 0x1a2040, 0x111828);
gridHelper.position.y = -60;
scene.add(gridHelper);

// ─── Animate ───────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  // Gentle node pulse
  const t = Date.now() * 0.001;
  Object.values(nodeObjects).forEach((m,i) => {
    if(!dragging || dragging.mesh !== m) {
      const s = 1 + 0.025 * Math.sin(t*1.2 + i*0.7);
      m.scale.setScalar(s);
    }
  });
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>

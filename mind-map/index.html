<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caleb Caraway — Entity Structure</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #060a12; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: #dde4ef; }

    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; height: 50px;
      background: rgba(6,10,18,0.94); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; gap: 12px; padding: 0 20px; z-index: 200;
    }
    .logo { font-size: 13px; font-weight: 700; color: #f0c040; letter-spacing: 2px; text-transform: uppercase; }
    .divider { width: 1px; height: 22px; background: rgba(255,255,255,0.1); }
    #search { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 5px 10px; color: #dde4ef; font-size: 13px; outline: none; width: 180px; }
    #search:focus { border-color: rgba(240,192,64,0.4); }
    #search::placeholder { color: rgba(255,255,255,0.25); }
    .hint { font-size: 11px; color: rgba(255,255,255,0.25); margin-left: auto; }

    #graph { width: 100%; height: 100%; }

    .legend {
      position: fixed; bottom: 14px; left: 14px; background: rgba(6,10,18,0.92);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px 14px;
      font-size: 11px; z-index: 200; pointer-events: none;
    }
    .legend-row { display: flex; align-items: center; gap: 7px; margin: 3px 0; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

    #info {
      position: fixed; top: 58px; right: 14px; width: 280px;
      background: rgba(6,10,18,0.95); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 16px; font-size: 13px; z-index: 200; display: none;
    }
    #info h3 { color: #f0c040; margin-bottom: 6px; font-size: 14px; }
    #info .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    #info .conns { margin-top: 8px; }
    #info .conn { color: rgba(255,255,255,0.55); margin: 2px 0; }
    .close-info { position: absolute; top: 8px; right: 10px; background: none; border: none; color: rgba(255,255,255,0.35); cursor: pointer; font-size: 15px; }
    .close-info:hover { color: #fff; }

    #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; z-index: 300; }
    #loading .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #f0c040; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; z-index: 300; }
    #error h2 { color: #ff6b6b; margin-bottom: 8px; }
    #error p { color: rgba(255,255,255,0.5); max-width: 400px; }
  </style>
</head>
<body>
  <div id="toolbar">
    <span class="logo">Dark Horse</span>
    <span class="divider"></span>
    <input id="search" type="text" placeholder="Search entities…" />
    <span class="hint">Click node for details · Scroll to zoom · Drag to orbit</span>
  </div>

  <div id="graph"></div>

  <div class="legend">
    <div class="legend-row"><span class="dot" style="background:#f0c040"></span> Trust</div>
    <div class="legend-row"><span class="dot" style="background:#7c8dff"></span> Holdings</div>
    <div class="legend-row"><span class="dot" style="background:#4ecdc4"></span> Family Office</div>
    <div class="legend-row"><span class="dot" style="background:#ff6b6b"></span> Management Co</div>
    <div class="legend-row"><span class="dot" style="background:#a855f7"></span> Fund</div>
    <div class="legend-row"><span class="dot" style="background:#22c55e"></span> Operations</div>
    <div class="legend-row"><span class="dot" style="background:#94a3b8"></span> Investment</div>
    <div style="margin-top:5px;border-top:1px solid rgba(255,255,255,0.06);padding-top:5px;">
      <div class="legend-row" style="color:rgba(255,255,255,0.35);">━ Structural</div>
      <div class="legend-row" style="color:#ff6b6b;">╌ Cross-investment</div>
    </div>
  </div>

  <div id="info">
    <button class="close-info" onclick="document.getElementById('info').style.display='none'">✕</button>
    <h3 id="info-name"></h3>
    <div id="info-badge" class="badge"></div>
    <div class="conns" id="info-conns"></div>
  </div>

  <div id="loading"><div class="spinner"></div><div style="color:rgba(255,255,255,0.4);font-size:13px;">Loading 3D graph…</div></div>
  <div id="error"><h2>Failed to load</h2><p id="error-msg"></p></div>

  <!-- Three.js + 3d-force-graph + SpriteText from CDN with fallback -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three-spritetext@1.8.2/dist/three-spritetext.min.js"></script>
  <script src="https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>

  <script>
    // ── CONFIG ──
    const TYPE_COLORS = {
      'trust':         '#f0c040',
      'holdings':      '#7c8dff',
      'family-office': '#4ecdc4',
      'mgmt':          '#ff6b6b',
      'fund':          '#a855f7',
      'operations':    '#22c55e',
      'investment':    '#94a3b8'
    };
    const TYPE_LABELS = {
      'trust':'Trust','holdings':'Holdings','family-office':'Family Office',
      'mgmt':'Management Co','fund':'Fund','operations':'Operations','investment':'Investment'
    };
    const TYPE_SHAPES = {
      'trust': 'diamond', 'holdings': 'sphere', 'family-office': 'sphere',
      'mgmt': 'box', 'fund': 'octahedron', 'operations': 'sphere', 'investment': 'sphere'
    };

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error-msg').textContent = msg;
    }

    // Verify libraries loaded
    if (typeof THREE === 'undefined') { showError('Three.js failed to load from CDN.'); throw new Error('no THREE'); }
    if (typeof ForceGraph3D === 'undefined') { showError('3d-force-graph failed to load from CDN.'); throw new Error('no ForceGraph3D'); }
    if (typeof SpriteText === 'undefined') { showError('SpriteText failed to load from CDN.'); throw new Error('no SpriteText'); }

    let graphData = null;
    let Graph = null;
    let highlightNode = null;

    fetch('data.json')
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(data => {
        graphData = data;
        document.getElementById('loading').style.display = 'none';
        buildGraph(data);
      })
      .catch(err => showError('data.json: ' + err.message));

    function buildGraph(data) {
      const container = document.getElementById('graph');

      Graph = ForceGraph3D()(container)
        .backgroundColor('#060a12')
        .width(window.innerWidth)
        .height(window.innerHeight)
        .graphData({
          nodes: data.nodes.map(n => ({ ...n })),
          links: data.links.map(l => ({ ...l }))
        })
        // ── NODES ──
        .nodeThreeObject(node => {
          const color = TYPE_COLORS[node.type] || '#94a3b8';
          const sz = (node.size || 8) * 1.2;

          // Create group
          const group = new THREE.Group();

          // Shape
          let geom;
          const shape = TYPE_SHAPES[node.type] || 'sphere';
          if (shape === 'diamond') {
            geom = new THREE.OctahedronGeometry(sz * 0.8);
          } else if (shape === 'box') {
            geom = new THREE.BoxGeometry(sz, sz, sz);
          } else if (shape === 'octahedron') {
            geom = new THREE.OctahedronGeometry(sz * 0.6);
          } else {
            geom = new THREE.SphereGeometry(sz * 0.5, 24, 24);
          }
          const mat = new THREE.MeshPhongMaterial({
            color: new THREE.Color(color),
            transparent: true,
            opacity: 0.85,
            shininess: 80,
            emissive: new THREE.Color(color),
            emissiveIntensity: 0.15
          });
          const mesh = new THREE.Mesh(geom, mat);
          group.add(mesh);

          // Glow
          const glowGeom = new THREE.SphereGeometry(sz * 0.75, 16, 16);
          const glowMat = new THREE.MeshBasicMaterial({
            color: new THREE.Color(color),
            transparent: true,
            opacity: 0.08
          });
          group.add(new THREE.Mesh(glowGeom, glowMat));

          // Label
          const lines = (node.label || '').split('\n');
          const sprite = new SpriteText(lines[0], 4.5, '#ffffff');
          sprite.fontFace = 'Segoe UI, system-ui, sans-serif';
          sprite.fontWeight = '600';
          sprite.backgroundColor = 'rgba(0,0,0,0.55)';
          sprite.borderRadius = 3;
          sprite.padding = [2, 5];
          sprite.position.set(0, -sz - 4, 0);
          group.add(sprite);

          // Subtitle (2nd line)
          if (lines[1]) {
            const sub = new SpriteText(lines[1], 3.2, 'rgba(255,255,255,0.55)');
            sub.fontFace = 'Segoe UI, system-ui, sans-serif';
            sub.backgroundColor = 'rgba(0,0,0,0.4)';
            sub.borderRadius = 2;
            sub.padding = [1, 4];
            sub.position.set(0, -sz - 9, 0);
            group.add(sub);
          }

          return group;
        })
        .nodeLabel(() => '') // we handle labels ourselves
        // ── LINKS ──
        .linkWidth(link => link.linkType === 'cross' ? 1 : 2)
        .linkColor(link => link.linkType === 'cross' ? 'rgba(255,107,107,0.5)' : 'rgba(255,255,255,0.18)')
        .linkDirectionalArrowLength(5)
        .linkDirectionalArrowRelPos(1)
        .linkDirectionalArrowColor(link => link.linkType === 'cross' ? '#ff6b6b' : 'rgba(255,255,255,0.3)')
        .linkDirectionalParticles(link => link.linkType === 'cross' ? 3 : 0)
        .linkDirectionalParticleWidth(1.5)
        .linkDirectionalParticleColor(() => '#ff6b6b')
        .linkLineDash(link => link.linkType === 'cross' ? [4, 2] : null)
        .linkLabel(link => link.label || '')
        // ── INTERACTION ──
        .onNodeClick(node => showInfo(node, data))
        .onBackgroundClick(() => { document.getElementById('info').style.display = 'none'; })
        // ── FORCES ──
        .d3AlphaDecay(0.02)
        .d3VelocityDecay(0.3)
        .warmupTicks(60)
        .cooldownTicks(120);

      // Add lights
      const scene = Graph.scene();
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(100, 200, 100);
      scene.add(dirLight);
      const pointLight = new THREE.PointLight(0xf0c040, 0.4, 500);
      pointLight.position.set(0, 100, 0);
      scene.add(pointLight);

      // Custom forces for hierarchy
      Graph.d3Force('charge').strength(-180);
      Graph.d3Force('link').distance(link => link.linkType === 'cross' ? 120 : 60);

      // Resize
      window.addEventListener('resize', () => {
        Graph.width(window.innerWidth);
        Graph.height(window.innerHeight);
      });

      // Initial camera position
      setTimeout(() => {
        Graph.cameraPosition({ x: 0, y: 0, z: 300 }, { x: 0, y: 0, z: 0 }, 1500);
      }, 500);
    }

    // ── INFO PANEL ──
    function showInfo(node, data) {
      const el = document.getElementById('info');
      const color = TYPE_COLORS[node.type] || '#94a3b8';
      document.getElementById('info-name').textContent = node.label.replace(/\n/g, ' — ');
      const badge = document.getElementById('info-badge');
      badge.textContent = TYPE_LABELS[node.type] || node.type;
      badge.style.background = color;
      badge.style.color = ['#f0c040','#4ecdc4'].includes(color) ? '#000' : '#fff';

      const conns = data.links.filter(l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        return s === node.id || t === node.id;
      });
      let html = '<div style="color:rgba(255,255,255,0.3);font-size:10px;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;">Connections (' + conns.length + ')</div>';
      conns.forEach(l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        const otherId = s === node.id ? t : s;
        const other = data.nodes.find(n => n.id === otherId);
        if (!other) return;
        const dir = s === node.id ? '→' : '←';
        const oc = TYPE_COLORS[other.type] || '#94a3b8';
        const lbl = l.label ? ' <span style="color:rgba(255,255,255,0.3);">(' + l.label + ')</span>' : '';
        html += '<div class="conn">' + dir + ' <span style="color:' + oc + '">' + other.label.split('\n')[0] + '</span>' + lbl + '</div>';
      });
      document.getElementById('info-conns').innerHTML = html;
      el.style.display = 'block';

      // Fly camera to node
      if (Graph) {
        const dist = 120;
        const pos = node;
        Graph.cameraPosition(
          { x: pos.x + dist * 0.5, y: pos.y + dist * 0.3, z: pos.z + dist },
          { x: pos.x, y: pos.y, z: pos.z },
          800
        );
      }
    }

    // ── SEARCH ──
    document.getElementById('search').addEventListener('input', function() {
      const q = this.value.toLowerCase().trim();
      if (!graphData || !Graph) return;
      if (!q) {
        // Reset all
        Graph.nodeThreeObject(Graph.nodeThreeObject()); // force refresh
        return;
      }
      const match = graphData.nodes.find(n => n.label.toLowerCase().includes(q));
      if (match && match.x !== undefined) {
        const dist = 100;
        Graph.cameraPosition(
          { x: match.x + dist * 0.3, y: match.y + dist * 0.2, z: match.z + dist },
          { x: match.x, y: match.y, z: match.z },
          600
        );
      }
    });
  </script>
</body>
</html>
